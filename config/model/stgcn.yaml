train:
  model: stgcn
  epochs: 100
  batch_size: 32
  learning_rate: 0.001
  use_focal_loss: false
  focal_gamma: 2.0
  focal_alpha: null
  oversample: false
  oversample_ratio: 1.0
  features: ["temp"]
  seed: 42

data:
  window:
    window_size: 60
    train_stride: 10
    test_stride: 60
  split:
    strategy: connectivity-chronological
    train_ratio: 0.8
    val_ratio: 0.1
    test_ratio: 0.1
    tolerance: 0.05

model_kwargs:
  st_hidden: 64
  num_st_blocks: 2
  temporal_kernel: 3
  dropout: 0.2
